<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Private Conversations</title>

  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="Private Conversations" />
  <meta property="og:description" content="Explore anonymous feelings and hidden stories." />
  <meta property="og:image" content="https://latechatroom.github.io/preview.jpg" />
  <meta property="og:url" content="https://latechatroom.github.io" />
  <meta property="og:type" content="website" />

  <!-- Twitter Preview -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Private Conversations" />
  <meta name="twitter:description" content="Explore anonymous feelings and hidden stories." />
  <meta name="twitter:image" content="https://latechatroom.github.io/preview.jpg" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(to bottom, #090909, #151020);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(20, 20, 25, 0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 30px 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      text-align: center;
    }

    .icon {
      font-size: 52px;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 32px;
      line-height: 1.3;
      margin-bottom: 16px;
    }

    p {
      color: #c7c7c7;
      line-height: 1.7;
      font-size: 15px;
    }

    .quote-box {
      margin-top: 28px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 20px;
      text-align: left;
    }

    .time {
      font-size: 12px;
      color: #8d8d8d;
      margin-bottom: 12px;
    }

    .quote {
      font-size: 18px;
      line-height: 1.6;
      color: #f2f2f2;
    }

    .btn {
      display: block;
      margin-top: 30px;
      width: 100%;
      background: white;
      color: black;
      text-decoration: none;
      padding: 18px;
      border-radius: 50px;
      font-weight: bold;
      font-size: 18px;
      transition: 0.3s ease;
    }

    .btn:hover {
      transform: scale(1.02);
      opacity: 0.9;
    }

    .footer {
      margin-top: 24px;
      font-size: 13px;
      color: #777;
      letter-spacing: 2px;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 28px;
      }

      .quote {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">💌</div>

    <h1>Private Conversations</h1>

    <p>
      Some thoughts are never shared publicly. Explore anonymous feelings,
      hidden stories, and late-night confessions.
    </p>

    <div class="quote-box">
      <div class="time">2:14 AM</div>
      <div class="quote">
        “I still think about our last conversation sometimes.”
      </div>
    </div>

    <a href="https://cdsecure-dt.com/C3i42dUQ6C" class="btn">
      Continue
    </a>

    <div class="footer">
      midnight feelings · anonymous stories
    </div>
  </div>
</body>
</html>
